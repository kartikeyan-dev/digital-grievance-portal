<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Complaint - Public Grievance Portal</title>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>


<nav class="navbar navbar-expand-lg gov-navbar">
    <div class="container">
        <span class="navbar-brand text-white fw-bold">
            🇮🇳 Public Grievance Portal
        </span>
       
        <div class="navbar-nav ms-auto">
            <a class="nav-link text-white" href="/">Home</a>
            <a class="nav-link text-white active" href="/submit">Submit</a>
            <a class="nav-link text-white" href="/track">Track</a>
            <a class="nav-link text-white" href="/login">Admin</a>
        </div>
    </div>
</nav>

<div class="gov-strip"></div>

<!-- ✅ MAIN CONTENT -->
<div class="container mt-5">
    <div class="col-md-6 offset-md-3">

        <div class="gov-card shadow-sm">

            <!-- Title -->
            <h4 class="section-title text-center mb-3">
                Lodge a Complaint
            </h4>

            <!-- SUCCESS MESSAGE -->
            {% if complaint_id %}
            <div class="alert alert-success text-center">
                <strong>Complaint Submitted Successfully!</strong><br>
                Your Complaint ID is: 
                <strong>{{ complaint_id }}</strong><br>
                Please use this ID to track your complaint.
            </div>
            {% endif %}

            <!-- FORM -->
            <form method="post">

                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" name="name" class="form-control" required placeholder="Enter your full name">
                </div>

                <div class="mb-3">
                    <label class="form-label">Location</label>
                    <input type="text" name="location" class="form-control" required placeholder="City / Area">
                </div>

                <div class="mb-3">
                    <label class="form-label">Category</label>
                    <select name="category" class="form-select" required>
                        <option value="">Select Category</option>
                        <option value="Infrastructure">Infrastructure</option>
                        <option value="Service">Service Delay</option>
                        <option value="Sanitation">Sanitation</option>
                        <option value="Traffic">Traffic</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <textarea name="description" class="form-control" rows="4" required placeholder="Describe the issue clearly"></textarea>
                </div>

                <!-- BUTTON -->
                <button type="submit" class="btn btn-gov w-100">
                    Submit Complaint
                </button>

            </form>

        </div>
    </div>
</div>

<!-- ✅ FOOTER -->
<footer class="text-center mt-5 p-3" style="background:#0b3d91; color:white;">
    © 2026 Public Grievance Portal
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
